<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sidebar with Icons</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        .wrapper {
            display: flex;
            align-items: stretch;
        }

        .sidebar-wrapper {
            min-height: 100vh;
            margin-left: -15rem;
            background-color: #0c1c2e;
            -webkit-transition: margin 0.25s ease-out;
            -moz-transition: margin 0.25s ease-out;
            transition: margin 0.25s ease-out;
        }

        .wrapper.toggled #sidebar-wrapper {
            margin-left: 0;
        }

        .page-content-wrapper {
            width: 100%;
        }

        @media (min-width: 768px) {
            #sidebar-wrapper {
                margin-left: 0;
            }
        }
    </style>
</head>
<body>

<div class="w-64 h-screen bg-gray-800 text-white flex flex-col fixed z-50" *ngIf="authService.isLoggedIn | async">
    <!-- Logo -->
    <div class="h-20 flex items-center justify-center border-b border-gray-700">
        <span class="text-2xl font-semibold"></span>
    </div>
    <!-- Navigation -->
    <nav class="flex-1 px-4 py-6">
        <ul>
            <li>
                <a routerLink="/app-profile" class="flex items-center py-2.5 px-4 rounded transition duration-200 hover:bg-gray-700">
                    <i class="fas fa-user mr-2"></i> Profile
                </a>
            </li>
            <li>
                <a routerLink="/app-settings" class="flex items-center py-2.5 px-4 rounded transition duration-200 hover:bg-gray-700">
                    <i class="fas fa-cog mr-2"></i> Settings
                </a>
            </li>
            <li>
                <a routerLink="/calendar-view" class="flex items-center py-2.5 px-4 rounded transition duration-200 hover:bg-gray-700">
                    <i class="fas fa-cog mr-2"></i> Calendar
                </a>
            </li>
            <li>
                <a routerLink="/app-notifications" class="flex items-center py-2.5 px-4 rounded transition duration-200 hover:bg-gray-700">
                    <i class="fas fa-bell mr-2"></i> Notifications
                </a>
            </li>
            <li>
                <a routerLink="/help-document" class="flex items-center py-2.5 px-4 rounded transition duration-200 hover:bg-gray-700">
                    <i class="fas fa-question-circle mr-2"></i> Help Document
                </a>
            </li>
            <li>
                <a class="flex items-center py-2.5 px-4 rounded transition duration-200 hover:bg-gray-700" (click)="logout()">
                    <i class="fas fa-sign-out-alt mr-2"></i> Logout
                </a>
            </li>
        </ul>
    </nav>
    <!-- Footer -->
    <div class="h-16 flex items-center justify-center border-t border-gray-700">
        <span class="text-sm">&copy; J&W Vehicle System</span>
    </div>
</div>

</body>
</html>
