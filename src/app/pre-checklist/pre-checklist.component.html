<div class="container">
  <form [formGroup]="preChecklistForm" (ngSubmit)="onSubmit()">
    <h3>Pre-Checklist</h3>
    <button type="button" class="btn btn-secondary" (click)="checkAll(true)">Check All</button>
    <div class="form-group">
      <label for="openingKms">Opening Kms:</label>
      <input type="number" id="openingKms" formControlName="openingKms" required class="form-control" />
    </div>

    <!-- Scrollable container for checkboxes -->
    <div class="checkbox-container">
      <div class="form-group" *ngFor="let check of checkboxes">
        <label>
          <input type="checkbox" [formControlName]="check.formControlName" />
          {{ check.label }}
        </label>
      </div>
    </div>

    <div class="form-group">
      <label for="comments">Comments:</label>
      <textarea id="comments" formControlName="comments" class="form-control"></textarea>
    </div>

    <div class="form-group">
      <label for="additionalComments">Additional Comments:</label>
      <textarea id="additionalComments" formControlName="additionalComments" class="form-control"></textarea>
    </div>

    <!-- Hidden field for PreChecklistId -->
    <input type="hidden" formControlName="preChecklistId" />

    <div class="button-group">
      <button type="submit" class="btn btn-primary" [disabled]="!preChecklistForm.valid">Submit Checklist</button>
    </div>
  </form>
</div>
