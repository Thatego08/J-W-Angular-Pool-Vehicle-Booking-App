<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<div class="container">
  <form [formGroup]="preChecklistForm" (ngSubmit)="onSubmit()" class="form-container shadow p-4">
    <h3 class="form-title mb-4">
      <i class="fas fa-check-circle"></i>Complete Pre-Checklist
    </h3>

    <button type="button" class="btn btn-outline-secondary mb-3" (click)="checkAll(true)">
      Check All
    </button>

    <div class="form-group">
      <label for="openingKms">Opening Kms:</label>
      <input
        type="number"
        id="openingKms"
        formControlName="openingKms"
        required
        class="form-control"
        placeholder="Enter opening kilometers"
      />
      <div
        *ngIf="
          preChecklistForm.get('openingKms')?.hasError('nonNegative') &&
          preChecklistForm.get('openingKms')?.touched
        "
        class="text-danger"
      >
        Opening Kms cannot be negative.
      </div>
    </div>

    <div class="checkbox-container mb-4">
      <h5 class="checkbox-title">Checklist Items:</h5>
      <div class="form-group" *ngFor="let check of checkboxes">
        <div class="form-check d-flex justify-content-between align-items-center mb-3">
          <label class="form-check-label">
            {{ check.label }}
          </label>
          <input
            type="checkbox"
            [formControlName]="check.formControlName"
            class="form-check-input"
          />
        </div>
      </div>
    </div>

    <div class="form-group">
      <label for="comments">Comments:</label>
      <textarea
        id="comments"
        formControlName="comments"
        class="form-control"
        placeholder="Enter Comments"
        rows="3"
      ></textarea>
    </div>

    <div class="form-group">
      <label for="additionalComments">Additional Comments:</label>
      <textarea
        id="additionalComments"
        formControlName="additionalComments"
        class="form-control"
        placeholder="Enter Additional Comments"
        rows="3"
      ></textarea>
    </div>

    <input type="hidden" formControlName="preChecklistId" />

    <div class="button-group text-center">
      <button
        type="submit"
        class="btn btn-primary"
        [disabled]="!preChecklistForm.valid"
      >
      <i class="fas fa-paper-plane"></i> Submit Checklist
      </button>
    </div>

    <div *ngIf="!preChecklistForm.get('licenseDiskValid')?.value && preChecklistForm.touched" class="text-danger text-center mt-3">
      License disk must be valid.
    </div>
  </form>
</div>
