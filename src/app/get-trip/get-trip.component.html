<div class="container">
  <img src="assets/logo.png" alt="Logo" class="logo-image">
  <h2>Trip History</h2>

  <div class="form-group">
    <label for="username">Enter Username:</label>
    <input type="text" id="username" [(ngModel)]="searchUsername" class="form-control" />
  </div>
  <button (click)="fetchPreviousTrips()" class="btn btn-primary">Search</button>

  <div *ngIf="previousTrips.length > 0">
    <table class="trip-table">
      <thead>
        <tr>
          <th>Trip ID</th>
          <th>Vehicle Name</th>
          <th>Location</th>
          <th>Comment</th>
          <th>Travel Start</th>
          <th>Travel End</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let trip of previousTrips">
          <td>{{ trip.tripId }}</td>
          <td>{{ trip.name }}</td>
          <td>{{ trip.location }}</td>
          <td>{{ trip.comment }}</td>
          <td>{{ trip.travelStart | date: 'short' }}</td>
          <td>{{ trip.travelEnd | date: 'short' }}</td>
          <td>
            <div class="button-group">
              <button (click)="editTrip(trip)" class="action-button bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded">
                Edit
              </button>
              <button (click)="deleteTrip(trip.tripId)" class="action-button bg-red-500 hover:bg-red-700 text-white font-bold py-2 px-4 rounded">
                Delete
              </button>

              <button 
                (click)="navigateToCreatePostChecklist()" 
                class="btn-submit text-white font-bold py-2 px-4 rounded"
                [ngStyle]="{'background-color': isTravelEndPassed(trip.travelEnd) ? 'grey' : '#3b82f6', 'cursor': isTravelEndPassed(trip.travelEnd) ? 'not-allowed' : 'pointer'}"
                [disabled]="isTravelEndPassed(trip.travelEnd)">
                Create Post Checklist
              </button>
              
              <button 
                (click)="navigateToRefuel(trip.tripId)" 
                class="action-button text-white font-bold py-2 px-4 rounded"
                [ngStyle]="{'background-color': isTravelEndPassed(trip.travelEnd) ? 'grey' : '#10b981', 'cursor': isTravelEndPassed(trip.travelEnd) ? 'not-allowed' : 'pointer'}"
                [disabled]="isTravelEndPassed(trip.travelEnd)">
                Refuel
              </button>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<app-help></app-help>
