<div class="report-container">
  <p>Janky Report Page :)</p>

  <div id="report-page" class="report-container">
    <h1>Report</h1>
    
    <!-- Export PDF Button (temporarily hidden during export) -->
    <button id="export-button" (click)="exportToPdf()">Export to PDF</button>

    <div class="report-card">
      <h2>Booking Type Report</h2>
      <table>
        <thead>
          <tr>
            <th>Type</th>
            <th>Count</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let report of bookingTypeReport">
            <td>{{ report.type }}</td>
            <td>{{ report.count }}</td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- In report.component.html -->
<div class="report-card">
  <h2>Vehicle Make Report</h2>
  <table>
    <thead>
      <tr>
        <th>Make</th>
        <th>Count</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let report of vehicleMakeReport">
        <td>{{ report.make }}</td>
        <td>{{ report.count }}</td>
      </tr>
    </tbody>
  </table>
</div>

<!-- End Of List Reports Transaction reports to follow -->

    <div>
      <h2>Vehicle Status Report</h2>
      <canvas id="vehicleStatusChart"></canvas>
    </div>

    <div>
      <h2>Booking Type Chart</h2>
      <canvas id="bookingTypeChart"></canvas>
    </div>

    <div>
      <h2>Trip Report</h2>
      <canvas id="tripChart"></canvas>
    </div>

    <div>
      <h2>Booking Status Report</h2>
      <canvas id="bookingStatusChart"></canvas>
    </div>

    <div>
      <h2>Project Status Report</h2>
      <canvas id="projectStatusChart"></canvas>
    </div>
  </div>
</div>
