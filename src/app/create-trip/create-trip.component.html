<div class="container">
    <h2>Create a New Trip</h2>

    <!-- Main Trip Details Section -->
    <form [formGroup]="tripForm" (ngSubmit)="onSubmit()" class="trip-form">
        <div class="form-section">
            <!-- Vehicle ID -->
            <div class="form-group">
                <label for="vehicleId">Vehicle ID</label>
                <input type="text" id="vehicleId" formControlName="vehicleId" class="form-control">
                <div *ngIf="tripForm.get('vehicleId')?.invalid && tripForm.get('vehicleId')?.touched"
                    class="text-danger">
                    Vehicle ID is required.
                </div>
            </div>

            <!-- Location -->
            <div class="form-group">
                <label for="location">Location</label>
                <input type="text" id="location" formControlName="location" class="form-control">
                <div *ngIf="tripForm.get('location')?.invalid && tripForm.get('location')?.touched"
                    class="text-danger">
                    Location is required.
                </div>
            </div>

            <!-- Fuel Amount -->
            <div class="form-group">
                <label for="fuelAmount">Fuel Amount</label>
                <input type="number" id="fuelAmount" formControlName="fuelAmount" class="form-control">
                <div *ngIf="tripForm.get('fuelAmount')?.invalid && tripForm.get('fuelAmount')?.touched"
                    class="text-danger">
                    Fuel Amount is required.
                </div>
            </div>

            <!-- Comment -->
            <div class="form-group">
                <label for="comment">Comment</label>
                <textarea id="comment" formControlName="comment" class="form-control"></textarea>
            </div>

            <!-- Travel Start Date -->
            <div class="form-group">
                <label for="travelStart">Travel Start Date</label>
                <input type="date" id="travelStart" formControlName="travelStart" class="form-control">
                <div *ngIf="tripForm.get('travelStart')?.invalid && tripForm.get('travelStart')?.touched"
                    class="text-danger">
                    Travel Start Date is required.
                </div>
            </div>

            <!-- Travel End Date -->
            <div class="form-group">
                <label for="travelEnd">Travel End Date</label>
                <input type="date" id="travelEnd" formControlName="travelEnd" class="form-control">
                <div *ngIf="tripForm.get('travelEnd')?.invalid && tripForm.get('travelEnd')?.touched"
                    class="text-danger">
                    Travel End Date is required.
                </div>
            </div>

            <!-- Registration Number -->
            <div class="form-group">
                <label for="registrationNumber">Registration Number</label>
                <input type="text" id="registrationNumber" formControlName="registrationNumber" class="form-control">
            </div>
        </div>

        <!-- Media Upload Section -->
        <div class="section-divider"></div>

        <div class="section-heading">
            <h3>Record Incident</h3>
        </div>

        <div class="form-group">
            <label for="mediaFiles">Media Files</label>
            <input type="file" id="mediaFiles" formControlName="mediaFiles" class="form-control-file"
                (change)="onFileChange($event)">
        </div>

        <div class="form-group">
            <label for="mediaDescription">Media Description</label>
            <input id="mediaDescription" formControlName="mediaDescription" class="form-control">
        </div>

        <!-- Image preview section -->
        <div class="image-preview">
            <div *ngIf="imagePreview" class="preview-container">
                <img [src]="imagePreview" alt="Image Preview" class="img-preview">
                <button type="button" class="btn btn-link cancel-button" (click)="cancelImage()">Cancel</button>
            </div>
        </div>

        <!-- Submit button -->
        <div class="form-group text-center">
            <button type="submit" class="btn btn-primary" [disabled]="tripForm.invalid">Submit</button>
        </div>
    </form>

    <!-- Success message -->
    <div *ngIf="message" class="alert alert-success">
        {{ message }}
    </div>
</div>
