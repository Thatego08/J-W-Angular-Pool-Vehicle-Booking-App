<div class="container">
  <h2>Add New Transmission</h2>
  <form [formGroup]="transmissionForm" (ngSubmit)="onSubmit()">
    <div class="mb-3">
      <label for="name" class="form-label">Transmission Name</label>
      <input type="text" class="form-control" id="name" formControlName="name">
      <div *ngIf="transmissionForm.get('name')?.invalid && transmissionForm.get('name')?.touched" 
           class="text-danger">
        Name is required
      </div>
    </div>
    <button type="submit" class="btn btn-primary">Submit</button>
    <a routerLink="/transmission" class="btn btn-secondary ms-2">Cancel</a>
  </form>
</div>
