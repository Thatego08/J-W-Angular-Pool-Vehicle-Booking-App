<div class="header-container">
    <img src="assets/logo.png" alt="Logo" class="logo">
  </div>
  <br>
  <br>
  
  <div class="container mx-auto p-6">
    <button class="btn btn-danger" routerLink="/manage-vehicle"> Back to Manage Vehicles </button>
    <br>
    <br>
    <h2> Vehicle Models </h2>
    <div *ngIf="vehicleModels.length > 0">
      <table class="min-w-full bg-white border border-gray-200 shadow-md rounded-md overflow-hidden mt-6">
        <thead class="bg-blue-500 text-white uppercase text-sm">
          <tr>
            <th class="py-3 px-6 text-left">Model Name </th>
            <th class="py-3 px-6 text-left">Make Name </th>
            <th class="py-3 px-6 text-left">Actions </th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let model of vehicleModels" class="text-gray-700">
            <td class="py-3 px-6">{{ model.vehicleModelName }}</td>
            <td class="py-3 px-6">{{ model.vehicleMake?.name }}</td>
            <td class="py-3 px-6">
              <button class="action-button bg-green-500 hover:bg-green-700 text-white font-bold py-2 px-4 rounded"
              (click)="navigateToEditModel(model.vehicleModelId)" >Edit</button>
              <button class="action-button bg-red-500 hover:bg-red-700 text-white font-bold py-2 px-4 rounded"
              (click)="deleteModel(model.vehicleModelId)">
                Delete
              </button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
    <div *ngIf="vehicleModels.length === 0" class="text-center mt-4 text-gray-600">
      No vehicle models found.
    </div>
