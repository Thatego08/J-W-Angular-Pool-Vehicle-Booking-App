<div class="header-container">
    <img src="assets/logo.png" alt="Logo" class="logo">
  </div>
  

 
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-6">
        <form #form="ngForm" (ngSubmit)="updateFuel()">
          <h2 class="text-center">Edit Fuel Type</h2>
          <div class="mb-3">
            <label for="name" class="form-label"></label>
            <input type="text" class="form-control" id="name" name="name" [(ngModel)]="fuel.fuelName" style="border-color: darkgray;">
          </div>
          <div class="text-center">
            <button type="submit" class="btn btn-primary">Save</button>
            <button type="button" class="btn btn-danger ms-2" (click)="cancel()">Cancel</button>
          </div>
        </form>
      </div>
    </div>
  </div>
