<div class="header-container">
    <img src="assets/logo.png" alt="Logo" class="logo">
  </div>
  <div class="container">
    <button class="btn btn-danger" routerLink="/vehicle-model"> Back </button>
      <h2>Add Vehicle Model</h2>
      <form [formGroup]="modelForm" (ngSubmit)="onSubmit()">
        <!-- <div class="form-group">
          <label for="id">Colour ID:</label>
          <input type="number" formControlName="Id" class="form-control" id="id" placeholder="Enter Colour ID">
        </div> -->
        <div class="form-group">
          <label for="vehicleModelName">Name:</label>
          <input type="text" formControlName="vehicleModelName" class="form-control" id="vehicleModelName" placeholder="Enter Vehicle Model">
        </div>
        <div class="form-group">
          <label for="vehicleMake">Vehicle Make:</label>
          <select formControlName="vehicleMakeId" class="form-control" id="vehicleMake">
            <option *ngFor="let make of vehicleMakes" [value]="make.vehicleMakeID">{{ make.name }}</option>
          </select>
        </div>
        <button type="submit" class="btn btn-primary" [disabled]="!modelForm.valid">Submit</button>
      </form>
    </div>
