<div class="header-container">
    <img src="assets/logo.png" alt="Logo" class="logo">
  </div>
  
  <div class="container">
    <h2>Edit Vehicle Model</h2>
    <form [formGroup]="modelForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="vehicleModelName">Vehicle Model Name</label>
        <input 
          id="vehicleModelName" 
          formControlName="vehicleModelName" 
          class="form-control" 
          type="text" 
          placeholder="Enter vehicle model name"
        />
        <div *ngIf="modelForm.get('vehicleModelName')?.invalid && modelForm.get('vehicleModelName')?.touched" class="text-danger">
          Vehicle model name is required.
        </div>
      </div>
  
      <div class="form-group">
        <label for="vehicleMakeId">Vehicle Make</label>
        <select id="vehicleMakeId" formControlName="vehicleMakeId" class="form-control">
          <option *ngFor="let make of vehicleMakes" [value]="make.vehicleMakeID">{{ make.name }}</option>
        </select>
        <div *ngIf="modelForm.get('vehicleMakeId')?.invalid && modelForm.get('vehicleMakeId')?.touched" class="text-danger">
          Vehicle make is required.
        </div>
      </div>
  
      <button 
        type="submit" 
        class="btn btn-primary"
        [disabled]="modelForm.invalid"
      >
        Save Changes
      </button>
      <button type="button" class="btn btn-secondary" (click)="cancel()">Cancel</button>
    </form>
  </div>
