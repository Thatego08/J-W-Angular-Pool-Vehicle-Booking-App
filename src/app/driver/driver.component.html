<img src="assets/logo.png" alt="Logo" class="logo-image">

<button (click)="exportDriversToJson()">Export Drivers to JSON</button>

<div class="container my-auto mx-auto p-24">
  <div class="search-bar">
    <input type="text" [(ngModel)]="searchUsername" placeholder="Search by username" class="search-input">
    <button (click)="searchDriver()" class="search-button bg-blue-500 hover:bg-blue-700 text-white py-2 px-4 rounded">
      <i class="fas fa-search"></i>Search
    </button>
  </div>

  <div *ngIf="drivers.length > 0">
    <table class="min-w-full bg-white border border-gray-200 shadow-md rounded-md overflow-hidden mt-6">
      <thead class="bg-blue-500 text-white uppercase text-sm">
        <tr>
          <th class="py-3 px-6 border-b border-gray-200">Name</th>
          <th class="py-3 px-6 border-b border-gray-200">Surname</th>
          <th class="py-3 px-6 border-b border-gray-200">Email</th>
          <th class="py-3 px-6 border-b border-gray-200">UserName</th>
          <th class="py-3 px-6 border-b border-gray-200">Phone</th>
          <th class="py-3 px-6 border-b border-gray-200">Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let driver of drivers" class="text-gray-700">
          <td class="py-3 px-6 border-b border-gray-200">{{ driver.name }}</td>
          <td class="py-3 px-6 border-b border-gray-200">{{ driver.surname }}</td>
          <td class="py-3 px-6 border-b border-gray-200">{{ driver.email }}</td>
          <td class="py-3 px-6 border-b border-gray-200">{{ driver.userName }}</td>
          <td class="py-3 px-6 border-b border-gray-200">{{ driver.phoneNumber }}</td>
          <td class="py-3 px-6 border-b border-gray-200">
            <div class="button-group">
              <a [routerLink]="['/edit-driver', driver.userName]" class="btn-edit action-button bg-blue-500 hover:bg-blue-700 text-white font-bold">
                Edit
              </a>
              <button (click)="deleteDriver(driver.userName)" class="action-button bg-red-500 hover:bg-red-700 text-white font-bold">
                Delete
              </button>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
  <div *ngIf="drivers.length === 0" class="text-center mt-4 text-gray-600">
    No drivers found.
  </div>
</div>
