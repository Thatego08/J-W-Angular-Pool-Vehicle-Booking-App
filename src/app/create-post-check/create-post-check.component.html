<div class="container">
  <div class="form-container">
    <h2><i class="fa fa-check-circle"></i> Complete Post-Check</h2>
    <form [formGroup]="postCheckForm" (ngSubmit)="submitForm()" enctype="multipart/form-data" class="post-check-form">

      <!-- Hidden Trip ID -->
      <input type="hidden" formControlName="TripId" [value]="tripId">

      <!-- No Opening Kms Display (just used in TS validation) -->

      <div class="row mb-3">
        <!-- Closing Kms Field -->
        <div class="col-md-6">
          <label for="ClosingKms">Closing Kms:</label>
          <input type="number" id="ClosingKms"
                 formControlName="ClosingKms"
                 (input)="validateClosingKms()"
                 class="form-control">

          <!-- Reactive Form Validation Messages -->
          <div *ngIf="postCheckForm.get('ClosingKms')?.invalid && (postCheckForm.get('ClosingKms')?.touched || postCheckForm.get('ClosingKms')?.dirty)" class="error-message">
            <div *ngIf="postCheckForm.get('ClosingKms')?.errors?.['required']">Closing Kms is required.</div>
            <div *ngIf="postCheckForm.get('ClosingKms')?.errors?.['negativeKms']">Closing Kms must be a positive number.</div>
            <div *ngIf="postCheckForm.get('ClosingKms')?.errors?.['lessThanOpening']">Closing Kms must not be less than Opening Kms ({{ openingKms }}).</div>
          </div>
        </div>
      </div>

      <!-- Check All Button -->
      <div class="form-header mb-3">
        <button type="button" class="check-all-btn btn btn-outline-primary" (click)="checkAll(true)">Check All as Compliant</button>
      </div>

      <!-- Checklist Items -->
      <div class="mb-4">
        <h5>Checklist Items:</h5>
        <div class="scrollable-checklist" style="max-height: 400px; overflow-y: auto;">
          <!-- Header Row -->
          <div class="checklist-header d-flex fw-bold mb-2 ps-3">
            <div style="flex: 2;">Item</div>
            <div style="flex: 1; text-align: center;">Compliant</div>
            <div style="flex: 1; text-align: center;">Not-Compliant</div>
            <div style="flex: 1; text-align: center;">N/A</div>
          </div>

          <!-- Checklist Rows -->
          <div *ngFor="let check of checkboxes"
               class="checklist-row d-flex align-items-center ps-3 mb-2"
               [ngClass]="{'not-compliant-row': postCheckForm.get(check.formControlName)?.value === 'not-compliant'}">

            <div style="flex: 2;" class="fw-bold">
              {{ check.label }}
            </div>

            <div style="flex: 1; text-align: center;">
              <input type="radio"
                     [formControlName]="check.formControlName"
                     value="compliant"
                     class="form-check-input">
            </div>

            <div style="flex: 1; text-align: center;">
              <input type="radio"
                     [formControlName]="check.formControlName"
                     value="not-compliant"
                     class="form-check-input">
            </div>

            <div style="flex: 1; text-align: center;">
              <input type="radio"
                     [formControlName]="check.formControlName"
                     value="not-applicable"
                     class="form-check-input">
            </div>
          </div>
        </div>
      </div>

      <!-- Comments Section -->
      <div class="row mb-3">
        <div class="col-md-6">
          <label for="Comments">Comments:</label>
          <textarea id="Comments" formControlName="Comments" class="form-control" rows="2"></textarea>
        </div>
        <div class="col-md-6">
          <label for="AdditionalComments">Additional Comments:</label>
          <textarea id="AdditionalComments" formControlName="AdditionalComments" class="form-control" rows="2"></textarea>
        </div>
      </div>

      <!-- File Upload -->
      <div class="form-group mb-3">
        <label for="MediaFiles">Upload Files:</label>
        <input type="file" id="MediaFiles" (change)="onFileChange($event)" multiple accept="image/*,video/*" class="form-control-file">
      </div>

      <!-- Media Previews -->
      <div *ngIf="mediaPreviews.length > 0" class="media-previews mb-3">
        <h4>Media Preview</h4>
        <div *ngFor="let preview of mediaPreviews">
          <div *ngIf="preview.type === 'image'">
            <img [src]="preview.previewUrl" [alt]="preview.file.name" class="preview-image" />
          </div>
          <div *ngIf="preview.type === 'video'">
            <video [src]="preview.previewUrl" controls class="preview-video"></video>
          </div>
        </div>
      </div>

      <!-- Media Description -->
      <div class="form-group mb-3">
        <label for="MediaDescription">Media Description:</label>
        <input type="text" id="MediaDescription" formControlName="MediaDescription" class="form-control">
      </div>

      <!-- License Disk Valid Checkbox -->
      <div class="form-group mb-3">
        <label for="LicenseDiskValid">License Disk Valid:</label>
        <input type="checkbox" id="LicenseDiskValid" formControlName="LicenseDiskValid" class="form-check-input small-checkbox">
        <div *ngIf="postCheckForm.get('LicenseDiskValid')?.invalid && (postCheckForm.get('LicenseDiskValid')?.touched || postCheckForm.get('LicenseDiskValid')?.dirty)" class="error-message">
          <div *ngIf="postCheckForm.get('LicenseDiskValid')?.errors?.['requiredTrue']">License Disk must be valid.</div>
        </div>
      </div>

      <!-- Submit Button -->
      <div class="form-footer mb-3">
        <button type="submit" class="btn btn-primary" [disabled]="postCheckForm.invalid">
          <i class="fa fa-paper-plane"></i> Submit Post-Check
        </button>
      </div>

      <!-- Success Message -->
      <div *ngIf="successMessage" class="success-message">{{ successMessage }}</div>
    </form>
  </div>
</div>
