<div class="container">
  <h2>Project Management</h2>

  <!-- Search Bar -->
  <input type="text" [(ngModel)]="searchQuery" (input)="searchProjects()" placeholder="Search by project number or description" />

  <!-- Project List Table -->
  <table class="table table-bordered mt-3">
    <thead>
      <tr>
        <th>Project Number</th>
        <th>Description</th>
        <th>Status</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let project of filteredProjects">
        <td>{{ project.projectNumber }}</td>
        <td>{{ project.description }}</td>
        <td>{{ project.statusName }}</td>
        <td>
          <button class="btn btn-warning" (click)="openProjectModal(editProjectModal, project)">Edit</button>
          <button class="btn btn-danger" (click)="deleteProject(project.projectID)">Delete</button>
        </td>
      </tr>
    </tbody>
  </table>

  <!-- Pagination Controls -->
  <nav *ngIf="projects.length > itemsPerPage">
    <ul class="pagination">
      <li class="page-item" [class.disabled]="currentPage === 1">
        <a class="page-link" (click)="changePage(currentPage - 1)">Previous</a>
      </li>
      <li class="page-item" [class.active]="pageIndex === currentPage" *ngFor="let pageIndex of [].constructor(Math.ceil(projects.length / itemsPerPage)); let i = index">
        <a class="page-link" (click)="changePage(pageIndex + 1)">{{ pageIndex + 1 }}</a>
      </li>
      <li class="page-item" [class.disabled]="currentPage === Math.ceil(projects.length / itemsPerPage)">
        <a class="page-link" (click)="changePage(currentPage + 1)">Next</a>
      </li>
    </ul>
  </nav>

  <!-- Add/Edit Project Modal -->
  <ng-template #addProjectModal let-modal>
    <div class="modal-header">
      <h5 class="modal-title">Add New Project</h5>
      <button type="button" class="btn-close" (click)="modal.dismiss()"></button>
    </div>
    <div class="modal-body">
      <form #projectForm="ngForm">
        <div class="form-group">
          <label>Project Number</label>
          <input type="text" [(ngModel)]="newProject.projectNumber" name="projectNumber" required class="form-control" />
        </div>
        <div class="form-group">
          <label>Description</label>
          <input type="text" [(ngModel)]="newProject.description" name="description" required class="form-control" />
        </div>
        <div class="form-group">
          <label>Status</label>
          <select [(ngModel)]="newProject.status" name="status" required class="form-control">
            <option value="Active">Active</option>
            <option value="Inactive">Inactive</option>
            <option value="Concluded">Concluded</option>
          </select>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button type="button" class="btn btn-secondary" (click)="modal.dismiss()">Cancel</button>
      <button type="button" class="btn btn-primary" (click)="addProject(newProject)">Add Project</button>
    </div>
  </ng-template>

  <!-- Edit Project Modal -->
<ng-template #editProjectModal let-modal>
  <div class="modal-header">
    <h5 class="modal-title">Edit Project</h5>
    <button type="button" class="btn-close" (click)="modal.dismiss()"></button>
  </div>
  <div class="modal-body">
    <form #editProjectForm="ngForm">
      <div class="form-group">
        <label>Project Number</label>
        <input type="text" [(ngModel)]="selectedProject!.projectNumber" name="projectNumber" required class="form-control" />
      </div>
      <div class="form-group">
        <label>Description</label>
        <input type="text" [(ngModel)]="selectedProject!.description" name="description" required class="form-control" />
      </div>
      <div class="form-group">
        <label>Status</label>
        <select [(ngModel)]="selectedProject!.statusId" name="status" required class="form-control">
          <option value="Active">Active</option>
          <option value="Inactive">Inactive</option>
          <option value="Concluded">Concluded</option>
        </select>
      </div>
      <div class="form-group">
        <label>Rate</label>
        <select [(ngModel)]="selectedProject!.rateID" name="rateId" required class="form-control">
          <!-- <option *ngFor="let rate of rates" [value]="rate.RateID">{{ rate.conditions }}</option> -->
          <option value="Half-Day Rate">Half-Day Rate</option>
          <option value="Full-Day Rate">Full-Day Rate</option>
          <option value="Travel Kilometer Rate">Travel Kilometer Rate</option>
        </select>
      </div>
    </form>
  </div>
  <div class="modal-footer">
    <button type="button" class="btn btn-secondary" (click)="modal.dismiss()">Cancel</button>
    <button type="button" class="btn btn-primary" (click)="selectedProject && updateProject(selectedProject)">Save Changes</button>
  </div>

</ng-template>


  <br>
  
  <!-- Add Project Button -->
  <button class="btn btn-primary" (click)="openProjectModal(addProjectModal)">Add New Project</button>
