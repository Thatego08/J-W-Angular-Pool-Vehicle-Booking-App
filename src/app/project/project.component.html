<div class="container mt-4">
  <h2 class="mb-4">📋 Project Management</h2>

  <!-- Search Bar with Icon -->
  <div class="row mb-3">
    <div class="col-md-6">
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-search"></i></span>
        <input
          type="text"
          class="form-control"
          [(ngModel)]="searchQuery"
          (input)="searchProjects()"
          placeholder="Search by project number or description"
        />
      </div>
    </div>
    <div class="col-md-6 text-md-end mt-2 mt-md-0">
      <button class="btn btn-primary" (click)="openAddModal(addProjectModal)">
        <i class="bi bi-plus-circle"></i> Add New Project
      </button>
    </div>
  </div>

  <!-- Responsive Table -->
  <div class="table-responsive">
    <table class="table table-hover table-bordered align-middle">
      <thead class="table-light">
        <tr>
          <th>Project Number</th>
          <th>Description</th>
          <th>Status</th>
          <th class="text-center">Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let project of filteredProjects">
          <td><strong>{{ project.projectNumber }}</strong></td>
          <td>{{ project.description }}</td>
          <td>
            <span class="badge" [ngClass]="getStatusBadgeClass(project.statusName)">
              {{ project.statusName || 'Unknown' }}
            </span>
          </td>
          <td class="text-center">
            <button
              class="btn btn-sm btn-warning me-2"
              (click)="openEditModal(editProjectModal, project)"
              title="Edit project"
            >
              <i class="bi bi-pencil"></i> Edit
            </button>
            <button
              class="btn btn-sm btn-danger"
              (click)="deleteProject(project.projectID)"
              title="Delete project"
            >
              <i class="bi bi-trash"></i> Delete
            </button>
          </td>
        </tr>
        <tr *ngIf="filteredProjects.length === 0">
          <td colspan="4" class="text-center text-muted py-4">
            No projects found.
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Pagination Controls (centered) -->
  <nav *ngIf="projects.length > itemsPerPage" class="d-flex justify-content-center mt-3">
    <ul class="pagination">
      <li class="page-item" [class.disabled]="currentPage === 1">
        <a class="page-link" (click)="changePage(currentPage - 1)" aria-label="Previous">
          <span aria-hidden="true">&laquo;</span>
        </a>
      </li>
      <li
        class="page-item"
        [class.active]="page === currentPage"
        *ngFor="let page of pages"
      >
        <a class="page-link" (click)="changePage(page)">{{ page }}</a>
      </li>
      <li class="page-item" [class.disabled]="currentPage === totalPages">
        <a class="page-link" (click)="changePage(currentPage + 1)" aria-label="Next">
          <span aria-hidden="true">&raquo;</span>
        </a>
      </li>
    </ul>
  </nav>

  <!-- Add Project Modal (unchanged) -->
  <ng-template #addProjectModal let-modal>
    <div class="modal-header">
      <h5 class="modal-title">Add New Project</h5>
      <button type="button" class="btn-close" (click)="modal.dismiss()"></button>
    </div>
    <div class="modal-body">
      <form>
        <div class="form-group">
          <label>Project Number</label>
          <input
            type="number"
            class="form-control"
            [(ngModel)]="newProject.projectNumber"
            name="projectNumber"
            required
          />
        </div>
        <div class="form-group">
          <label>Job No</label>
          <input
            type="number"
            class="form-control"
            [(ngModel)]="newProject.jobNo"
            name="jobNo"
            required
          />
        </div>
        <div class="form-group">
          <label>Task Code</label>
          <input
            type="number"
            class="form-control"
            [(ngModel)]="newProject.taskCode"
            name="taskCode"
            required
          />
        </div>
        <div class="form-group">
          <label>Activity Code</label>
          <input
            type="number"
            class="form-control"
            [(ngModel)]="newProject.activityCode"
            name="activityCode"
            required
          />
        </div>
        <div class="form-group">
          <label>Description</label>
          <input
            type="text"
            class="form-control"
            [(ngModel)]="newProject.description"
            name="description"
            required
          />
        </div>
        <div class="form-group">
          <label>Status</label>
          <select
            class="form-control"
            [(ngModel)]="newProject.statusId"
            name="statusId"
            required
          >
            <option *ngFor="let status of statuses" [value]="status.id">
              {{ status.name }}
            </option>
          </select>
        </div>
        <div class="form-group">
          <label>Rates</label>
          <select
            multiple
            class="form-control"
            [(ngModel)]="newProject.rateID"
            name="rateID"
          >
            <option *ngFor="let rate of rates" [value]="rate.rateId">
              {{ rate.rateName }} ({{ rate.rateValue | currency }})
            </option>
          </select>
          <small class="text-muted">Hold Ctrl/Cmd to select multiple</small>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button type="button" class="btn btn-secondary" (click)="modal.dismiss()">
        Cancel
      </button>
      <button type="button" class="btn btn-primary" (click)="addProject()">
        Add Project
      </button>
    </div>
  </ng-template>

  <!-- Edit Project Modal (unchanged) -->
  <ng-template #editProjectModal let-modal>
    <div class="modal-header">
      <h5 class="modal-title">Edit Project</h5>
      <button type="button" class="btn-close" (click)="modal.dismiss()"></button>
    </div>
    <div class="modal-body" *ngIf="selectedProject">
      <form>
        <div class="form-group">
          <label>Project Number</label>
          <input
            type="number"
            class="form-control"
            [(ngModel)]="selectedProject.projectNumber"
            name="projectNumber"
            required
          />
        </div>
        <div class="form-group">
          <label>Job No</label>
          <input
            type="number"
            class="form-control"
            [(ngModel)]="selectedProject.jobNo"
            name="jobNo"
            required
          />
        </div>
        <div class="form-group">
          <label>Task Code</label>
          <input
            type="number"
            class="form-control"
            [(ngModel)]="selectedProject.taskCode"
            name="taskCode"
            required
          />
        </div>
        <div class="form-group">
          <label>Activity Code</label>
          <input
            type="number"
            class="form-control"
            [(ngModel)]="selectedProject.activityCode"
            name="activityCode"
            required
          />
        </div>
        <div class="form-group">
          <label>Description</label>
          <input
            type="text"
            class="form-control"
            [(ngModel)]="selectedProject.description"
            name="description"
            required
          />
        </div>
        <div class="form-group">
          <label>Status</label>
          <select
            class="form-control"
            [(ngModel)]="selectedProject.statusId"
            name="statusId"
            required
          >
            <option *ngFor="let status of statuses" [value]="status.id">
              {{ status.name }}
            </option>
          </select>
        </div>
        <div class="form-group">
          <label>Rates</label>
          <select
            multiple
            class="form-control"
            [(ngModel)]="selectedProject.rateID"
            name="rateID"
          >
            <option *ngFor="let rate of rates" [value]="rate.rateId">
              {{ rate.rateName }} ({{ rate.rateValue | currency }})
            </option>
          </select>
          <small class="text-muted">Hold Ctrl/Cmd to select multiple</small>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button type="button" class="btn btn-secondary" (click)="modal.dismiss()">
        Cancel
      </button>
      <button type="button" class="btn btn-primary" (click)="updateProject()">
        Save Changes
      </button>
    </div>
  </ng-template>
</div>
