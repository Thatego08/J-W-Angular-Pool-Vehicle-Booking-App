<h2 mat-dialog-title>{{ data.rate ? 'Edit Rate' : 'Add Rate' }}</h2>
<form [formGroup]="rateForm" (ngSubmit)="onSubmit()">
  <mat-form-field appearance="fill">
    <mat-label>Rate Type</mat-label>
    <input matInput formControlName="rateTypeName" placeholder="Rate Type">
  </mat-form-field>

  <mat-form-field appearance="fill">
    <mat-label>Rate Value</mat-label>
    <input matInput formControlName="rateValue" type="number" placeholder="Rate Value">
  </mat-form-field>

  <mat-form-field appearance="fill">
    <mat-label>Project Number</mat-label>
    <input matInput formControlName="projectNumber" placeholder="Project Number">
  </mat-form-field>

  <mat-form-field appearance="fill">
    <mat-label>Applicable Time Period</mat-label>
    <input matInput formControlName="applicableTimePeriod" placeholder="Applicable Time Period">
  </mat-form-field>

  <mat-form-field appearance="fill">
    <mat-label>Conditions</mat-label>
    <input matInput formControlName="conditions" placeholder="Conditions">
  </mat-form-field>

  <div mat-dialog-actions>
    <button mat-button type="button" (click)="onCancel()">Cancel</button>
    <button mat-button color="primary" type="submit">Save</button>
  </div>
</form>
