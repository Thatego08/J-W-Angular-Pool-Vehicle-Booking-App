<div class="flex-1 p-10">
  <div class="bg-gray-100 bg-opacity-75 p-6 rounded-lg shadow-md">
    <h1 class="text-3xl font-bold mb-6 text-blue-600">Manage Rates</h1>

    <!-- Add Rate and Search -->
    <div class="flex justify-between mb-6">
      <button 
        class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 transition duration-300"
        (click)="editRateModal"
      >
        Add Rate
      </button>
      <input 
        [(ngModel)]="searchRateID" 
        type="text" 
        placeholder="Search Rate ID" 
        class="p-2 border rounded-lg w-1/3 focus:outline-none focus:ring-2 focus:ring-blue-500"
      />
    </div>

    <!-- Rates Table -->
    <div class="overflow-x-auto">
      <table class="min-w-full bg-white rounded-lg shadow-md">
        <thead class="bg-blue-600 text-white">
          <tr>
         <th class="p-4 text-left">Conditions</th>
            <th class="p-4 text-left">Rate Value</th>
            <th class="p-4 text-left">Application Time Period</th>
            <th class="p-4 text-left">Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let rate of displayedRates" class="border-b">
           <td class="p-4">{{ rate?.conditions }}</td>
            <td class="p-4">{{ rate?.rateValue | currency }}</td>
            <td class="p-4">{{ rate?.applicableTimePeriod }}</td>
            <td class="p-4 flex space-x-4">
              <i 
                (click)="editRate(rate)" 
                class="fa fa-pencil text-green-600 cursor-pointer hover:text-green-800 transition duration-300"
              ></i>
              <i 
                (click)="openDeleteConfirmation(rate)" 
                class="fa fa-trash text-red-600 cursor-pointer hover:text-red-800 transition duration-300"
              ></i>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- Pagination Controls -->
    <div class="pagination-controls flex justify-between items-center mt-6">
      <button 
        class="bg-gray-300 text-gray-700 px-4 py-2 rounded hover:bg-gray-400 transition duration-300" 
        (click)="previousPage()" 
        [disabled]="currentPage === 1"
      >
        Previous
      </button>
      <span class="mx-4 text-lg">Page {{ currentPage }} of {{ totalPages }}</span>
      <button 
        class="bg-gray-300 text-gray-700 px-4 py-2 rounded hover:bg-gray-400 transition duration-300" 
        (click)="nextPage()" 
        [disabled]="currentPage === totalPages"
      >
        Next
      </button>
    </div>

    <!-- Delete Confirmation Modal -->
    <ng-template #deleteConfirmationModal let-modal>
      <div class="modal-header flex justify-between items-center">
        <h4 class="modal-title text-lg font-semibold">Confirm Delete</h4>
        <button 
          type="button" 
          class="text-red-600 text-2xl focus:outline-none"
          aria-label="Close" 
          (click)="modal.dismiss()"
        >
          &times;
        </button>
      </div>
      <div class="modal-body mt-4">
        <p>Are you sure you want to delete this rate?</p>
      </div>
      <div class="modal-footer flex justify-end mt-6">
        <button type="button" class="bg-gray-300 text-gray-700 px-4 py-2 rounded hover:bg-gray-400 mr-2" (click)="modal.dismiss()">Cancel</button>
        <button type="button" class="bg-red-600 text-white px-4 py-2 rounded hover:bg-red-700" (click)="deleteRate()">Delete</button>
      </div>
    </ng-template>

   <!-- Edit/Add Rate Modal -->
<ng-template #editRateModal let-modal>
  <div class="modal-body">
    <form #rateForm="ngForm">
      <!-- Conditions Input -->
      <div class="form-group mb-4">
        <label for="conditions" class="block">Conditions:</label>
        <input
          [(ngModel)]="rateToEdit.conditions"
          name="conditions"
          required
          class="form-control"
          placeholder="Enter rate conditions"
        />
      </div>

      <!-- Rate Value Input -->
      <div class="form-group mb-4">
        <label for="rateValue" class="block">Rate Value:</label>
        <input
          [(ngModel)]="rateToEdit.rateValue"
          name="rateValue"
          required
          type="number"
          class="form-control"
          placeholder="Enter rate value"
          min="0"
        />
      </div>

      <!-- Project Selection -->
      <div class="form-group mb-4">
        <label for="projectID" class="block">Project:</label>
        <select
          [(ngModel)]="rateToEdit.ProjectID"
          name="projectID"
          required
          class="form-control"
        >
          <option *ngFor="let project of projects" [value]="project.ProjectID">
            {{ project.ProjectID }}
          </option>
        </select>
      </div>

      <!-- Applicable Time Period -->
      <div class="form-group mb-4">
        <label for="applicableTimePeriod" class="block">Applicable Time Period:</label>
        <input
          [(ngModel)]="rateToEdit.applicableTimePeriod"
          name="applicableTimePeriod"
          class="form-control"
          placeholder="Enter time period"
        />
      </div>
    </form>
  </div>
  <div class="modal-footer">
    <button type="button" class="btn btn-secondary" (click)="modal.dismiss()">Cancel</button>
    <button type="button" class="btn btn-primary" (click)="saveRate()">
      {{ isEditMode ? 'Update' : 'Create' }}
    </button>
  </div>
</ng-template>
  </div>
</div>
