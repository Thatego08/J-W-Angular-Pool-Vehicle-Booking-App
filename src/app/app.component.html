<div *ngIf="isLoggedIn | async; else loginLayout" class="app-layout">
  <!-- Sidebar -->
  <app-side-nav class="sidebar"></app-side-nav>

  <!-- Main content area -->
  <div class="main-section">
    <!-- Top Navbar -->
    <app-nav-bar class="navbar"></app-nav-bar>

    <!-- Routed content -->
    <main class="content-area">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>

<ng-template #loginLayout>
  <router-outlet></router-outlet>
</ng-template>
