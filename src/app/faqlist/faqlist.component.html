<div class="container mx-auto my-5">
    <h2 class="text-center text-2xl font-bold mb-4">Frequently Asked Questions</h2>
  
    <ul class="list-group">
      <li *ngFor="let faq of faqs" class="list-group-item">
        <div (click)="toggleFaq(faq.faqId)" class="faq-question" style="cursor: pointer;">
          <strong>{{ faq.question }}</strong>
          <span class="float-end">{{ activeFaqId === faq.faqId ? '-' : '+' }}</span>
        </div>
        <div *ngIf="activeFaqId === faq.faqId" class="faq-answer mt-2">
          <p>{{ faq.answer }}</p>
        </div>
      </li>
    </ul>
  </div>
