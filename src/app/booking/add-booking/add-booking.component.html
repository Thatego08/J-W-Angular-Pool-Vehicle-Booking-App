<div class="container mt-4">
  <h4 class="text-center"><strong>Make New Booking</strong></h4>
  <form [formGroup]="bookingForm" (ngSubmit)="saveBooking()">
    <div class="form-group">
      <label for="userName">Username</label>
      <input id="userName" formControlName="userName" class="form-control" placeholder="Enter username" />
    </div>
    <div class="form-group">
      <label for="vehicleName">Vehicle</label>
      <div class="custom-select-wrapper">
        <select id="vehicleName" formControlName="vehicleName" class="form-control">
          <option *ngFor="let vehicle of vehicles" [value]="vehicle.name">{{ vehicle.name }}</option>
        </select>
        <i class="fa fa-caret-down dropdown-icon"></i>
      </div>
    </div>
    <div class="form-group radio-group">
      <label>
        <input type="radio" name="type" (change)="toggleEventProject(true)" [value]="'event'" formControlName="type" /> Event
      </label>
      <label>
        <input type="radio" name="type" (change)="toggleEventProject(false)" [value]="'project'" formControlName="type" /> Project
      </label>
    </div>
    <div *ngIf="!isEvent" class="form-group">
      <label for="projectNumber">Project Number</label>
      <div class="custom-select-wrapper">
        <select id="projectNumber" formControlName="projectNumber" class="form-control">
          <option *ngFor="let project of projects" [value]="project">{{ project }}</option>
        </select>
        <i class="fa fa-caret-down dropdown-icon"></i>
      </div>
    </div>
    <div *ngIf="isEvent" class="form-group">
      <label for="event">Event</label>
      <input id="event" formControlName="event" class="form-control" placeholder="Enter event" />
    </div>
    <div class="form-group">
      <label for="startDate">Start Date</label>
      <input id="startDate" formControlName="startDate" class="form-control" type="datetime-local" />
    </div>
    <div class="form-group">
      <label for="endDate">End Date</label>
      <input id="endDate" formControlName="endDate" class="form-control" type="datetime-local" />
    </div>

    <button type="submit" class="btn btn-success" [disabled]="!bookingForm.valid">Save</button>
    <button type="button" class="btn btn-danger" (click)="router.navigate(['/booking-list'])">Cancel</button>
  </form>
</div>
