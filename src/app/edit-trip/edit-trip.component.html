<div class="container mx-auto p-6">
  <h1 class="text-2xl font-bold mb-6">Edit Trip</h1>

  <form #form="ngForm" (ngSubmit)="updateTrip(form)" class="form-container">
    <div class="form-group mb-6">
      <label for="location" class="form-label">Location</label>
      <input type="text" class="form-control" id="location" name="location" [(ngModel)]="trip.location" required>
    </div>

    <div class="form-group mb-6">
      <label for="name" class="form-label">Vehicle Name</label>
      <input type="number" class="form-control" id="name" name="name" [(ngModel)]="trip.name">
    </div>
    <div class="form-group mb-6">
      <label for="fuelAmount" class="form-label">Fuel Amount</label>
      <input type="number" class="form-control" id="fuelAmount" name="fuelAmount" [(ngModel)]="trip.fuelAmount" required>
    </div>

    <div class="form-group mb-6">
      <label for="comment" class="form-label">Comment</label>
      <textarea class="form-control" id="comment" name="comment" [(ngModel)]="trip.comment"></textarea>
    </div>

    <div class="form-group mb-6">
      <label for="travelStart" class="form-label">Travel Start</label>
      <input type="datetime-local" class="form-control" id="travelStart" name="travelStart" [(ngModel)]="trip.travelStart" required>
    </div>

    <div class="form-group mb-6">
      <label for="travelEnd" class="form-label">Travel End</label>
      <input type="datetime-local" class="form-control" id="travelEnd" name="travelEnd" [(ngModel)]="trip.travelEnd" required>
    </div>

    <div class="form-group mb-6">
      <label for="registrationNumber" class="form-label">Registration Number</label>
      <input type="text" class="form-control" id="registrationNumber" name="registrationNumber" [(ngModel)]="trip.registrationNumber">
    </div>

   

    <div class="button-group">
      <button type="submit" class="btn-save action-button bg-blue-500 hover:bg-blue-700 text-white font-bold">Save</button>
      <a [routerLink]="['/get-trip']" class="btn-cancel action-button bg-red-500 hover:bg-red-700 text-white font-bold">Cancel</a>
    </div>
  </form>

  <div *ngIf="successMessage" class="alert alert-success mt-3">{{ successMessage }}</div>
  <div *ngIf="errorMessage" class="alert alert-danger mt-3">{{ errorMessage }}</div>
</div>
