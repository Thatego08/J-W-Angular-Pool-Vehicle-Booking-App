<div class="forgot-password-container">
  <h2>Forgot Password</h2>
  
  <!-- Step 1: Email Form -->
  <form [formGroup]="emailForm" (ngSubmit)="submitEmail()" *ngIf="step === 1">
    <div>
      <label for="email">Email:</label>
      <input id="email" formControlName="email" type="email" />
      <div *ngIf="emailForm?.get('email')?.invalid && emailForm?.get('email')?.touched">
        <small class="error">Email is required and must be a valid email address.</small>
      </div>
    </div>
    <button type="submit" [disabled]="emailForm.invalid">Submit</button>
  </form>

  <!-- Step 2: OTP Form -->
  <form [formGroup]="otpForm" (ngSubmit)="verifyOtp()" *ngIf="step === 2">
    <div>
      <label for="otp">OTP:</label>
      <input id="otp" formControlName="otp" type="text" />
      <div *ngIf="otpForm?.get('otp')?.invalid && otpForm?.get('otp')?.touched">
        <small class="error">OTP is required and must be exactly 6 characters long.</small>
      </div>
    </div>
    <button type="submit" [disabled]="otpForm.invalid">Verify OTP</button>
  </form>

  <!-- Step 3: Reset Password Form -->
  <form [formGroup]="resetPasswordForm" (ngSubmit)="resetPassword()" *ngIf="step === 3">
    <div>
      <label for="newPassword">New Password:</label>
      <input id="newPassword" formControlName="newPassword" type="password" />
      <div *ngIf="resetPasswordForm?.get('newPassword')?.invalid && resetPasswordForm?.get('newPassword')?.touched">
        <small class="error">Password is required and must be at least 6 characters long.</small>
      </div>
    </div>
    <button type="submit" [disabled]="resetPasswordForm.invalid">Reset Password</button>
  </form>
</div>


<app-notifications *ngIf="notificationMessage" [message]="notificationMessage" [isSuccess]="isSuccess"></app-notifications>
