<div class="feedback-form">
  <h2>Submit Feedback</h2>
  <form (ngSubmit)="submitFeedback()">
    <div>
      <label for="userName">Name</label>
      <input type="text" id="userName" [(ngModel)]="feedback.userName" name="userName" required>
    </div>
    <div>
      <label for="email">Email</label>
      <input type="email" id="email" [(ngModel)]="feedback.email" name="email" required>
    </div>
    <div>
      <label for="message">Message</label>
      <textarea id="message" [(ngModel)]="feedback.message" name="message" required></textarea>
    </div>
    <div>
      <label for="rating">Rating</label>
      <select id="rating" [(ngModel)]="feedback.rating" name="rating" required>
        <option value="" disabled>Select rating</option>
        <option *ngFor="let rating of ratings" [value]="rating">{{ rating }}</option>
      </select>
    </div>
    <button type="submit">Submit</button>
  </form>
  <p>{{ message }}</p>
</div>
