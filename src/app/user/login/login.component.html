<div class="login-form">
    <h2>Login</h2>
    <form (ngSubmit)="login()">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" [(ngModel)]="credentials.userName" name="userName" placeholder="Enter your email" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" [(ngModel)]="credentials.password" name="password" required>
      </div>
      <button type="submit">Login</button>
    </form>
  
    <div *ngIf="errorMessage" class="error-message">{{ errorMessage }}</div>
    <div *ngIf="successMessage" class="success-message">{{ successMessage }}</div>
  
    <p>Don't have an account? <a routerLink="/app-register">Register here</a></p>
  
    <div class="forgot-password-link">
      <a routerLink="/app-forgot-password">Forgot Password?</a>
    </div>
</div>
