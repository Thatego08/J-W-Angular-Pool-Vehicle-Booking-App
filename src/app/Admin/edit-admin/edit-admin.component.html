<!-- Edit Admin Modal -->
<ng-template #editAdminModal let-modal>
  <div class="modal-header">
    <h4 class="modal-title">Edit Admin</h4>
    <button type="button" class="close text-red-500" aria-label="Close" (click)="modal.dismiss()">
      <span aria-hidden="true">&times;</span>
    </button>
  </div>
  <div class="modal-body">
    <form (ngSubmit)="updateAdmin()" #editAdminForm="ngForm">
      <!-- Form fields for editing admin -->
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700">Username</label>
        <input type="text" [(ngModel)]="adminToEdit.userName" name="userName" class="mt-1 block w-full p-2 border rounded" required />
      </div>
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700">Name</label>
        <input type="text" [(ngModel)]="adminToEdit.name" name="name" class="mt-1 block w-full p-2 border rounded" required />
      </div>
      <div class="mb-4">
        <label class="block text-sm font-medium text-gray-700">Surname</label>
        <input type="text" [(ngModel)]="adminToEdit.surname" name="surname" class="mt-1 block w-full p-2 border rounded" required />
      </div>
      <!-- Add more fields as necessary -->
    </form>
  </div>
  <div class="modal-footer">
    <button type="button" class="btn btn-secondary" (click)="modal.dismiss()">Cancel</button>
    <button type="submit" class="btn btn-primary" [disabled]="!editAdminForm.form.valid">Save changes</button>
  </div>
</ng-template>

<div *ngIf="successMessage" class="mt-4 text-green-600">
  {{ successMessage }}
</div>
<div *ngIf="errorMessage" class="mt-4 text-red-600">
  {{ errorMessage }}
</div>
