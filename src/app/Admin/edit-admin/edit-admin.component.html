<div *ngIf="admin">
  <h2>Edit Admin</h2>
  <form #form="ngForm" (ngSubmit)="updateAdmin(form)">
    <div>
      <label>Username:</label>
      <input [(ngModel)]="admin.userName" name="userName" disabled />
    </div>
    <div>
      <label>Name:</label>
      <input [(ngModel)]="admin.name" name="name" required />
    </div>
    <div>
      <label>Surname:</label>
      <input [(ngModel)]="admin.surname" name="surname" required />
    </div>
    <div>
      <label>Email:</label>
      <input [(ngModel)]="admin.email" name="email" type="email" required />
    </div>
    <div>
      <label>Phone Number:</label>
      <input [(ngModel)]="admin.phoneNumber" name="phoneNumber" type="text" required />
    </div>
    <div>
      <button type="submit" [disabled]="form.invalid">Update Admin</button>
    </div>
  </form>
  <div *ngIf="errorMessage" class="error">{{ errorMessage }}</div>
</div>
