<div class="d-flex justify-content-between align-items-center mt-5">
    <h2>Manage Admins</h2>
  </div>
  <div class="container-fluid mt-6">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <button class="btn btn-primary" routerLink="/add-admin">
        <i class="bi bi-plus-circle"></i> Add Admin
      </button>
      <input type="text" class="form-control w-25" placeholder="Search Admins" >
    </div>
    <table class="table table-bordered">
      <thead>
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Email</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let item of users">
          <td>{{item.userId}}</td>
          <td>{{item.name}}</td>
          <td>{{item.email}}</td>
          <td class="text-center">
            <button class="btn btn-primary me-2"  >
             <i class="fa fa-pencil" ></i>
            </button>
            <button class="btn btn-danger" (click)="deleteAdmin(item.userId)">
            <i class="fa fa-trash"></i>
            </button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
