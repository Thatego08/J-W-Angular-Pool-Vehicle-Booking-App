<div class="flex-1 p-10">
  <div class="bg-gray-200 bg-opacity-75 p-4 rounded">
    <h1 class="text-3xl font-bold mb-6 text-blue-500">Manage Admins</h1>
    
    <div class="flex justify-between mb-4">
      <!-- Add Admin button -->
      <button 
        class="bg-blue-500 text-white p-2 rounded hover:bg-blue-700" 
        (click)="addAdmin()"
      >
        Add Admin
      </button>
      <!-- Search bar -->
      <input 
        [(ngModel)]="searchUsername" 
        (input)="searchAdmin()" 
        type="text" 
        placeholder="Search Admin" 
        class="p-2 border rounded w-1/3"
      />
    </div>

    <div class="overflow-x-auto">
      <table class="min-w-full">
        <thead class="bg-blue-500 text-white">
          <tr>
            <th class="p-2">Username</th>
            <th class="p-2">Name</th>
            <th class="p-2">Surname</th>
            <th class="p-2">Email</th>
            <th class="p-2">Phone Number</th>
            <th class="p-2">Role</th>
            <th class="p-2">Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let admin of displayedAdmins">
            <td class="p-2">{{ admin.userName }}</td>
            <td class="p-2">{{ admin.name }}</td>
            <td class="p-2">{{ admin.surname }}</td>
            <td class="p-2">{{ admin.email }}</td>
            <td class="p-2">{{ admin.phoneNumber }}</td>
            <td class="p-2">{{ admin.role }}</td>
            <td class="p-2 flex space-x-2">
              <i (click)="editAdmin(admin.userName)" class="fa fa-pencil text-green-700 cursor-pointer hover:text-green-900"></i>
              <i (click)="openDeleteConfirmation(admin)" class="fa fa-trash text-red-500 cursor-pointer hover:text-red-700"></i>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  
     <!-- Pagination Controls -->
 <div class="pagination-controls flex justify-between items-center mt-4">
  <button 
    class="bg-gray-300 text-gray-700 p-2 rounded hover:bg-gray-400" 
    (click)="previousPage()" 
    [disabled]="currentPage === 1"
  >
    Previous
  </button>
  <span class="mx-4">Page {{ currentPage }} of {{ totalPages }}</span>
  <button 
    class="bg-gray-300 text-gray-700 p-2 rounded hover:bg-gray-400" 
    (click)="nextPage()" 
    [disabled]="currentPage === totalPages"
  >
    Next
  </button>
</div>
  </div>
      
<!-- Delete Confirmation Modal -->
<ng-template #deleteConfirmationModal let-modal>
  <div class="modal-header flex justify-between items-center">
    <h4 class="modal-title">Confirm Delete</h4>
    <button 
      type="button" 
      class="text-red-500 text-lg focus:outline-none"
      aria-label="Close" 
      (click)="modal.dismiss()"
    >
      <span aria-hidden="true">&times;</span>
    </button>
  </div>
  <div class="modal-body">
    <p>Are you sure you want to delete this admin?</p>
  </div>
  <div class="modal-footer flex justify-end">
    <button type="button" class="btn btn-secondary mr-2" (click)="modal.dismiss()">Cancel</button>
    <button type="button" class="btn btn-danger" (click)="deleteAdmin()">Delete</button>
  </div>
</ng-template>
</div>
