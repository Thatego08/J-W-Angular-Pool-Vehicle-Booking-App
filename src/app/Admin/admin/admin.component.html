<div class="flex-1 p-6 bg-gray-100">
    <div class="container mx-auto bg-gray-50 shadow-md rounded-lg p-6">
      <h1 class="text-2xl font-semibold mb-4 text-blue-800">Manage Admins</h1>
      
      <div class="mb-4 flex items-center justify-between">
        <input 
          type="text" 
          [(ngModel)]="searchUsername" 
          (input)="searchAdmin()" 
          placeholder="Search by username"
          class="p-2 border border-gray-300 rounded"
        />
        <button (click)="clearSearch()" class="ml-2 px-4 py-2 bg-blue-500 text-white rounded">Clear Search</button>
        <button (click)="addAdmin()" class="ml-2 px-4 py-2 bg-blue-500 text-white rounded">Add Admin</button>
      </div>
      
      <table class="min-w-full bg-gray-100 border border-gray-300 rounded-lg">
        <thead class="bg-blue-800 text-white uppercase text-sm">
          <tr>
            <th class="py-2 px-4 border-b">Username</th>
            <th class="py-2 px-4 border-b">Name</th>
            <th class="py-2 px-4 border-b">Surname</th>
            <th class="py-2 px-4 border-b">Email</th>
            <th class="py-2 px-4 border-b">Phone Number</th>
            <th class="py-2 px-4 border-b">Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let admin of admins">
            <td class="py-2 px-4 border-b">{{ admin.userName }}</td>
            <td class="py-2 px-4 border-b">{{ admin.name }}</td>
            <td class="py-2 px-4 border-b">{{ admin.surname }}</td>
            <td class="py-2 px-4 border-b">{{ admin.email }}</td>
            <td class="py-2 px-4 border-b">{{ admin.phoneNumber }}</td>
            <td class="py-2 px-4 border-b flex space-x-2">
              <button (click)="updateAdmin(admin.userName)" class="text-blue-500 hover:text-blue-700">
                <i class="fas fa-pencil-alt"></i>
              </button>
              <button (click)="deleteAdmin(admin.userName)" class="text-red-500 hover:text-red-700">
                <i class="fas fa-trash-alt"></i>
              </button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
