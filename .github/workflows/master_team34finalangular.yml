# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Angular app to Azure Web App - team34finalangular

on:
  push:
    branches:
      - master   # or 'main' if that’s your branch
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read # Required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '18.x'  # Angular 18+ recommended

      - name: Install dependencies
        run: npm install

      - name: Build Angular app (production)
        run: npm run build -- --configuration production

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: angular-app
          path: dist/admin-account/browser   # Only the production build output

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: angular-app

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'team34finalangular'      # Your App Service name
          slot-name: 'Production'
          package: dist/admin-account/browser  # Path to Angular build
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE }}
