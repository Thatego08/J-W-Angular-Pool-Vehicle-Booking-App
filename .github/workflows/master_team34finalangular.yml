name: Build and deploy Angular app to Azure Web App - team34finalangular

on:
  push:
    branches:
      - master   # or 'main'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18.x'

      - name: Install dependencies
        run: npm install

      - name: Build Angular app
        run: npm run build -- --configuration production

      - name: Upload build folder for deployment
        uses: actions/upload-artifact@v4
        with:
          name: angular-app
          path: dist/admin-account/browser

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download build folder
        uses: actions/download-artifact@v4
        with:
          name: angular-app

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'team34finalangular'
          slot-name: 'Production'
          package: dist/admin-account/browser
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE }}
