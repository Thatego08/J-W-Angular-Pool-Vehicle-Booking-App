name: Build and Deploy Angular App to Azure App Service

on:
  push:
    branches:
      - master   # Change to 'main' if your main branch is called main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the repository
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'  # Match your Azure App Service Node runtime

      # Step 3: Install dependencies
      - name: Install dependencies
        run: npm ci   # Ensures a clean and consistent install in CI

      # Step 4: Build Angular production app
      - name: Build Angular app
        run: npm run build -- --configuration production

      # Step 5: Deploy to Azure App Service
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'team34finalangular'              # Your App Service name
          slot-name: 'Production'                     # Production slot
          package: './dist/browser/Admin-Account'    # Angular build output folder
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE }}

