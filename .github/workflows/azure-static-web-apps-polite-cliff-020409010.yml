name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - master
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - master

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      # 1. Checkout repository
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false

      # 2. Fix git config file permissions (optional)
      - name: Fix git config file permissions
        run: |
          chmod 664 .git/config
          find . -name config -path "*/.git/config" -exec chmod 664 {} \;

      # 3. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      # 4. Install dependencies and build Angular
      - name: Install and Build Angular
        run: |
          npm install
          npm run build -- --configuration production

      # 5. Deploy to Azure Static Web Apps
      - name: Deploy to Azure SWA
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_POLITE_CLIFF_020409010 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "/"                   # <-- root of repo
          api_location: ""                    # <-- empty if no backend API
          output_location: "dist/admin-account"  # <-- folder containing index.html

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_POLITE_CLIFF_020409010 }}
          action: "close"
